services:
  fts:
    build: .
    hostname: fts
    ports:
      - "8446:8446"
      - "8449:8449"
    depends_on:
      - ftsdb
    networks:
      - fts
    volumes:
      # Certificates must be provided externally. See README.md for how to generate them.
      # Place your files under ./certs/ (git-ignored) before starting.
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/ca.pem:/etc/grid-security/certificates/ca.pem:ro

  ftsdb:
    image: mysql:8
    hostname: ftsdb
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    ports:
      - "3306:3306"
    networks:
      - fts
    volumes:
      - ftsdb-data:/var/lib/mysql

networks:
  fts:

volumes:
  ftsdb-data: