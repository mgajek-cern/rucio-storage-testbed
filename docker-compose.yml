services:
  fts:
    build: .
    hostname: fts
    ports:
      - "8446:8446"
      - "8449:8449"
    depends_on:
      - ftsdb
    networks:
      - fts
    volumes:
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./scripts:/scripts:ro
      - ./config/gfal2_http_plugin.conf:/etc/gfal2.d/http_plugin.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8446/whoami"]
      interval: 5s
      timeout: 5s
      retries: 20

  ftsdb:
    image: mysql:8
    hostname: ftsdb
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    ports:
      - "3306:3306"
    networks:
      - fts
    volumes:
      - ftsdb-data:/var/lib/mysql

  xrd1:
    image: rucio/test-xrootd
    hostname: xrd1
    environment:
      - XRDPORT=1094
    ports:
      - "1094:1094"
    networks:
      - fts
    volumes:
      - ./certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ./certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        echo '\"/CN=fts\" xrootd' > /etc/grid-security/grid-mapfile &&
        echo '\"/CN=fts/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo 'setenv XrdSecGSISRVNAMES = *' >> /etc/xrootd/xrdrucio.cfg &&
        mkdir -p /rucio &&
        echo 'fts-test' > /rucio/fts-test-file &&
        chown xrootd:xrootd /rucio/fts-test-file &&
        /docker-entrypoint.sh
      "

  xrd2:
    image: rucio/test-xrootd
    hostname: xrd2
    environment:
      - XRDPORT=1094
    ports:
      - "1095:1094"
    networks:
      - fts
    volumes:
      - ./certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ./certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        echo '\"/CN=fts\" xrootd' > /etc/grid-security/grid-mapfile &&
        echo '\"/CN=fts/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo 'setenv XrdSecGSISRVNAMES = *' >> /etc/xrootd/xrdrucio.cfg &&
        /docker-entrypoint.sh
      "

  minio1:
    image: minio/minio:latest
    hostname: minio1
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - fts
    volumes:
      - minio1-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio2:
    image: minio/minio:latest
    hostname: minio2
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - fts
    volumes:
      - minio2-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio1-init:
    image: minio/mc:latest
    depends_on:
      minio1:
        condition: service_healthy
    networks:
      - fts
    entrypoint: >
      sh -c "
        mc alias set local http://minio1:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO1 bucket ready'
      "
    restart: "no"

  minio2-init:
    image: minio/mc:latest
    depends_on:
      minio2:
        condition: service_healthy
    networks:
      - fts
    entrypoint: >
      sh -c "
        mc alias set local http://minio2:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO2 bucket ready'
      "
    restart: "no"

  webdav1:
    image: rucio/test-webdav
    hostname: webdav1
    ports:
      - "443:443"
    networks:
      - fts
    volumes:
      - ./certs/webdav1cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/webdav1key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "

  webdav2:
    image: rucio/test-webdav
    hostname: webdav2
    ports:
      - "444:443"
    networks:
      - fts
    volumes:
      - ./certs/webdav2cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/webdav2key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "


