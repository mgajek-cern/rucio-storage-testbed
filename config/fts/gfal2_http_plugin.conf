# Configuration file for HTTP plugin
[HTTP PLUGIN]
ENABLE_REMOTE_COPY=true
ENABLE_STREAM_COPY=true
ENABLE_FALLBACK_TPC_COPY=true
DEFAULT_COPY_MODE=3rd pull
INSECURE=false
METALINK=false
LOG_LEVEL=0
LOG_SENSITIVE=false
LOG_CONTENT=false
KEEP_ALIVE=true
RETRIEVE_BEARER_TOKEN=true

# AWS S3 credentials for MinIO
# ALTERNATE=true enables path-style URLs required for non-AWS S3 endpoints
[S3]
SECRET_KEY=minioadmin
ACCESS_KEY=minioadmin
ALTERNATE=true
