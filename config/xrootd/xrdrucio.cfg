# We export /data to match your scitokens.conf base_path
all.export /data
xrd.port 1094

# TLS Configuration
xrd.tlsca certdir /etc/grid-security/certificates
xrd.tls /etc/grid-security/xrd/xrdcert.pem /etc/grid-security/xrd/xrdkey.pem
xrootd.tls capable all

# Zero Trust Network protocol
sec.protocol ztn

# HTTP/WebDAV Configuration
xrd.protocol http:1094 libXrdHttp.so
http.httpsport 1094
http.cadir /etc/grid-security/certificates
http.exthandler xrdtpc libXrdHttpTPC.so
http.header2cgi Authorization authz

# Map the internal /data path to the HTTP root
http.staticpath /data
http.listing /data

# Authorization
ofs.authorize 1
# __SCITOKENS_LIB__ is replaced by your entrypoint script
ofs.authlib ++ __SCITOKENS_LIB__ config=/etc/xrootd/scitokens.conf
acc.authdb /etc/xrootd/authdb

# SciTokens Tracing (useful for debugging the TPC)
scitokens.trace all
