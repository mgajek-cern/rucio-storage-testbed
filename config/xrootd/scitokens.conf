# /etc/xrootd/scitokens.conf
#
# Token-based authorization configuration for XRootD, aligned with the
# Keycloak realm.json that ships with this testbed.
#
# The realm defines these scopes (parameterless + parameterised by path):
#   storage.read         storage.modify
#   storage.read:/data   storage.modify:/data
#   storage.read:/       storage.modify:/
#
# XRootD will therefore export /data (matching storage.{read,modify}:/data).
#
# Audience: Keycloak's `rucio-oidc` client has a hardcoded oidc-audience-mapper
# that always adds the following audiences regardless of what is passed in
# the `audience=` form parameter:
#   fts-oidc, STORM1, STORM2, storm1, storm2, rucio-oidc
# We list ALL of these so any token the realm can mint is accepted. The
# xrd3/xrd4 hostnames and the WLCG "any" URN are kept in case the audience
# mapper is updated later to honour dynamic audience requests.

[Global]
# Fall through to the next authz library / authdb when no token or an
# unrecognised token is presented. Keeps the existing test flows working.
onmissing = passthrough
audience_json = ["fts-oidc", "STORM1", "STORM2", "storm1", "storm2", "rucio-oidc", "https://xrd3:1094", "https://xrd4:1094"]

[Issuer Keycloak Rucio Realm]
issuer       = https://keycloak:8443/realms/rucio
base_path    = /data
map_subject  = false
default_user = xrootd
# `capability` = trust scope-based storage.* claims directly (XRootD 5.7+).
authorization_strategy = capability
