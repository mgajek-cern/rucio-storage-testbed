services:
  fts:
    image: mgajekcern/test-fts
    hostname: fts
    ports:
      - "8446:8446"
      - "8449:8449"
    depends_on:
      - ftsdb
    networks:
      - fts
    volumes:
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./scripts:/scripts:ro
      - ./config/gfal2_http_plugin.conf:/etc/gfal2.d/http_plugin.conf:ro
      - ./scripts/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8446/whoami"]
      interval: 5s
      timeout: 5s
      retries: 20

  ftsdb:
    image: mysql:8
    hostname: ftsdb
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    ports:
      - "3306:3306"
    networks:
      - fts
    volumes:
      - ftsdb-data:/var/lib/mysql

  xrd1:
    image: rucio/test-xrootd
    hostname: xrd1
    environment:
      - XRDPORT=1094
    ports:
      - "1094:1094"
    networks:
      - fts
    volumes:
      - ./certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ./certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        echo '\"/CN=fts\" xrootd' > /etc/grid-security/grid-mapfile &&
        echo '\"/CN=fts/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/CN=xrd\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/O=Dummy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/O=Dummy/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo 'setenv XrdSecGSISRVNAMES = *' >> /etc/xrootd/xrdrucio.cfg &&
        mkdir -p /rucio &&
        echo 'fts-test' > /rucio/fts-test-file &&
        chown xrootd:xrootd /rucio/fts-test-file &&
        /docker-entrypoint.sh
      "

  # FTS OIDC instance — bearer token auth, no GSI proxy
  ftsdb-oidc:
    image: mysql:8
    hostname: ftsdb-oidc
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    networks:
      - fts
    volumes:
      - ftsdb-oidc-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufts", "-pfts"]
      interval: 5s
      timeout: 5s
      retries: 20
 
  fts-oidc:
    image: mgajekcern/test-fts
    hostname: fts-oidc
    ports:
      - "8447:8446"
    depends_on:
      ftsdb-oidc:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - fts
    volumes:
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./scripts:/scripts:ro
      - ./config/fts3config-oidc:/etc/fts3/fts3config:ro
      - ./config/fts3restconfig-oidc:/etc/fts3/fts3restconfig:ro
      - ./config/gfal2_http_plugin.conf:/etc/gfal2.d/http_plugin.conf:ro
      - ./scripts/docker-entrypoint-fts-oidc.sh:/docker-entrypoint.sh:ro
      - ./config/fts3rest-middleware.py:/tmp/fts-rest-flask/src/fts3rest/fts3rest/config/middleware.py:ro
      - ./config/fts3rest-openidconnect.py:/tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/openidconnect.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8446/whoami"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 20

  xrd2:
    image: rucio/test-xrootd
    hostname: xrd2
    environment:
      - XRDPORT=1094
    ports:
      - "1095:1094"
    networks:
      - fts
    volumes:
      - ./certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ./certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        echo '\"/CN=fts\" xrootd' > /etc/grid-security/grid-mapfile &&
        echo '\"/CN=fts/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/CN=xrd\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/O=Dummy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo '\"/O=Dummy/CN=proxy\" xrootd' >> /etc/grid-security/grid-mapfile &&
        echo 'setenv XrdSecGSISRVNAMES = *' >> /etc/xrootd/xrdrucio.cfg &&
        /docker-entrypoint.sh
      "

  minio1:
    image: minio/minio
    hostname: minio1
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - fts
    volumes:
      - minio1-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio2:
    image: minio/minio
    hostname: minio2
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - fts
    volumes:
      - minio2-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio1-init:
    image: minio/mc
    depends_on:
      minio1:
        condition: service_healthy
    networks:
      - fts
    entrypoint: >
      sh -c "
        mc alias set local http://minio1:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO1 bucket ready'
      "
    restart: "no"

  minio2-init:
    image: minio/mc
    depends_on:
      minio2:
        condition: service_healthy
    networks:
      - fts
    entrypoint: >
      sh -c "
        mc alias set local http://minio2:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO2 bucket ready'
      "
    restart: "no"

  webdav1:
    image: rucio/test-webdav
    hostname: webdav1
    ports:
      - "443:443"
    networks:
      - fts
    volumes:
      - ./certs/webdav1cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/webdav1key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "

  webdav2:
    image: rucio/test-webdav
    hostname: webdav2
    ports:
      - "444:443"
    networks:
      - fts
    volumes:
      - ./certs/webdav2cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/webdav2key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "

  storm1:
    image: ghcr.io/italiangrid/storm-webdav:v1.12.0
    platform: linux/amd64
    hostname: storm1
    ports:
      - "8443:8443"
      - "8085:8085"
    depends_on:
      - keycloak
    networks:
      - fts
    environment:
      - STORM_WEBDAV_HOSTNAME_0=storm1
      - STORM_WEBDAV_HTTPS_PORT=8443
      - STORM_WEBDAV_HTTP_PORT=8085
      - STORM_WEBDAV_SA_CONFIG_DIR=/etc/storm/webdav/sa.d
      - STORM_WEBDAV_CERTIFICATE_PATH=/etc/grid-security/hostcert.pem
      - STORM_WEBDAV_PRIVATE_KEY_PATH=/etc/grid-security/hostkey.pem
      - STORM_WEBDAV_TRUST_ANCHORS_DIR=/etc/grid-security/certificates
      - STORM_WEBDAV_TRUST_ANCHORS_REFRESH_INTERVAL=0
      - STORM_WEBDAV_REQUIRE_CLIENT_CERT=false
      - STORM_WEBDAV_AUTHZ_SERVER_ENABLE=true
      - STORM_WEBDAV_AUTHZ_SERVER_ISSUER=https://storm1:8443
      - STORM_WEBDAV_AUTHZ_SERVER_SECRET=supersupersupersecretlongerthan32chars!
      - STORM_WEBDAV_OAUTH_ISSUERS_REFRESH_PERIOD_MINUTES=1
      # Load issuers + policies via Spring profiles (matches official storm-webdav compose)
      - STORM_WEBDAV_JVM_OPTS=-Xms256m -Xmx512m -Djava.security.egd=file:/dev/./urandom -Dspring.profiles.active=issuers,policies
    volumes:
      - ./certs/storm1cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/storm1key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/trustanchors:/etc/grid-security/certificates:ro
      # Spring profile config files — mounted at /app/ so Spring Boot finds them on classpath
      - ./config/storm-application-issuers.yml:/app/application-issuers.yml:ro
      - ./config/storm-application-policies.yml:/app/application-policies.yml:ro
      - ./config/data.properties:/etc/storm/webdav/sa.d/data.properties:ro
      - storm1-data:/storage/data
      - vomsdir:/etc/grid-security/vomsdir
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8085/.storm-webdav/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 20
 
  storm2:
    image: ghcr.io/italiangrid/storm-webdav:v1.12.0
    platform: linux/amd64
    hostname: storm2
    ports:
      - "8444:8443"
      - "8086:8085"
    depends_on:
      - keycloak
    networks:
      - fts
    environment:
      - STORM_WEBDAV_HOSTNAME_0=storm2
      - STORM_WEBDAV_HTTPS_PORT=8443
      - STORM_WEBDAV_HTTP_PORT=8085
      - STORM_WEBDAV_SA_CONFIG_DIR=/etc/storm/webdav/sa.d
      - STORM_WEBDAV_CERTIFICATE_PATH=/etc/grid-security/hostcert.pem
      - STORM_WEBDAV_PRIVATE_KEY_PATH=/etc/grid-security/hostkey.pem
      - STORM_WEBDAV_TRUST_ANCHORS_DIR=/etc/grid-security/certificates
      - STORM_WEBDAV_TRUST_ANCHORS_REFRESH_INTERVAL=0
      - STORM_WEBDAV_REQUIRE_CLIENT_CERT=false
      - STORM_WEBDAV_AUTHZ_SERVER_ENABLE=true
      - STORM_WEBDAV_AUTHZ_SERVER_ISSUER=https://storm2:8443
      - STORM_WEBDAV_AUTHZ_SERVER_SECRET=supersupersupersecretlongerthan32chars!
      - STORM_WEBDAV_OAUTH_ISSUERS_REFRESH_PERIOD_MINUTES=1
      - STORM_WEBDAV_JVM_OPTS=-Xms256m -Xmx512m -Djava.security.egd=file:/dev/./urandom -Dspring.profiles.active=issuers,policies
    volumes:
      - ./certs/storm2cert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/storm2key.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/trustanchors:/etc/grid-security/certificates:ro
      - ./config/storm-application-issuers.yml:/app/application-issuers.yml:ro
      - ./config/storm-application-policies.yml:/app/application-policies.yml:ro
      - ./config/data.properties:/etc/storm/webdav/sa.d/data.properties:ro
      - storm2-data:/storage/data
      - vomsdir:/etc/grid-security/vomsdir
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8085/.storm-webdav/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.1
    hostname: keycloak
    command: start-dev --features=token-exchange --health-enabled=true --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"
    networks:
      - fts
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/rucio-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      start_period: 120s
      retries: 30

  ruciodb:
    image: postgres:14
    hostname: ruciodb
    environment:
      - POSTGRES_USER=rucio
      - POSTGRES_PASSWORD=rucio
      - POSTGRES_DB=rucio
    networks:
      - fts
    volumes:
      - ruciodb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucio"]
      interval: 5s
      timeout: 5s
      retries: 10

  ruciodb-oidc:
    image: postgres:14
    hostname: ruciodb-oidc
    environment:
      - POSTGRES_USER=rucio
      - POSTGRES_PASSWORD=rucio
      - POSTGRES_DB=rucio
    networks:
      - fts
    volumes:
      - ruciodb-oidc-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucio"]
      interval: 5s
      timeout: 5s
      retries: 10


  rucio:
    image: rucio/rucio-server
    hostname: rucio
    ports:
      - "8445:80"
    depends_on:
      ruciodb:
        condition: service_healthy
      fts:
        condition: service_healthy
    networks:
      - fts
    entrypoint:
      - bash
      - -c
      - |
        python3 /scripts/bootstrap-db.py &&
        exec /docker-entrypoint.sh httpd -DFOREGROUND
    volumes:
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ./config/rucio.cfg:/opt/rucio/etc/rucio.cfg:ro
      - ./config/alembic.ini:/opt/rucio/etc/alembic.ini:ro
      - ./scripts:/scripts:ro
      - ./certs/hostcert_with_key.pem:/etc/grid-security/hostcert_with_key.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  rucio-oidc:
    image: rucio/rucio-server
    hostname: rucio-oidc
    ports:
      - "8448:80"
    depends_on:
      ruciodb-oidc:
        condition: service_healthy
      fts:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - fts
    entrypoint:
      - bash
      - -c
      - |
        python3 /scripts/bootstrap-db.py &&
        exec /docker-entrypoint.sh httpd -DFOREGROUND
    volumes:
      - ./config/rucio-oidc.cfg:/opt/rucio/etc/rucio.cfg:ro
      - ./config/alembic-oidc.ini:/opt/rucio/etc/alembic.ini:ro
      - ./config/idpsecrets.json:/opt/rucio/etc/idpsecrets.json:ro
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ./certs/hostcert_with_key.pem:/etc/grid-security/hostcert_with_key.pem:ro
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  rucio-client:
    image: rucio/rucio-clients
    hostname: rucio-client
    depends_on:
      rucio:
        condition: service_healthy
    networks:
      - fts
    environment:
      - RUCIO_CFG_CLIENT_RUCIO_HOST=http://rucio
      - RUCIO_CFG_CLIENT_AUTH_HOST=http://rucio
      - RUCIO_CFG_CLIENT_AUTH_TYPE=userpass
      - RUCIO_CFG_CLIENT_USERNAME=ddmlab
      - RUCIO_CFG_CLIENT_PASSWORD=secret
      - RUCIO_CFG_CLIENT_ACCOUNT=root
    volumes:
      - ./certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ./certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ./certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ./config/rucio-userpass.cfg:/opt/rucio/etc/rucio-userpass.cfg:ro
      - ./config/rucio-oidc-client.cfg:/opt/rucio/etc/rucio-oidc-client.cfg:ro
      - ./scripts:/scripts:ro
    command: ["/bin/bash", "-c", "while true; do sleep 60; done"]

networks:
  fts:

volumes:
  ftsdb-data:
  minio1-data:
  minio2-data:
  storm1-data:
  storm2-data:
  ruciodb-data:
  ruciodb-oidc-data:
  ftsdb-oidc-data:
  vomsdir:
