# ============================================================================
# rucio-storage-testbed — umbrella values
# ============================================================================
# This file is the single source of truth for the testbed. Each top-level key
# below corresponds to a dependency alias in Chart.yaml and is passed directly
# to that subchart as its .Values.
#
# Three shared resources are created by templates in this chart and consumed
# by all subcharts:
#   - Secret      "testbed-certs"   (all PEMs)
#   - ConfigMap   "testbed-configs" (all non-secret config files)
#   - ConfigMap   "testbed-scripts" (all entrypoint/test scripts)
#   - Secret      "testbed-patches" (Python patches for FTS and Rucio)
#
# These are populated from files/ under this chart. See README.md for how to
# place your source tree before running `helm install`.
# ============================================================================

certs:
  create: true
  secretName: testbed-certs
  files:
    hostcert.pem: ""
    hostkey.pem: ""
    hostcert_with_key.pem: ""
    rucio_ca.pem: ""
    xrdcert.pem: ""
    xrdkey.pem: ""
    keycloakcert.pem: ""
    keycloakkey.pem: ""
    webdav1cert.pem: ""
    webdav1key.pem: ""
    webdav2cert.pem: ""
    webdav2key.pem: ""
    storm1cert.pem: ""
    storm1key.pem: ""
    storm2cert.pem: ""
    storm2key.pem: ""
    storm-cacerts: ""

configs:
  create: true
  configMapName: testbed-configs
scripts:
  create: true
  configMapName: testbed-scripts
patches:
  create: true
  configMapName: testbed-patches

# ===========================================================================
# DATABASES
# ===========================================================================

ruciodb:
  image:
    tag: "latest"
  enabled: true
  # bitnami/postgresql chart values
  fullnameOverride: ruciodb
  auth:
    username: rucio
    password: rucio
    database: rucio
  primary:
    persistence:
      enabled: true
      size: 2Gi

ruciodbOidc:
  image:
    tag: "latest"
  enabled: true
  fullnameOverride: ruciodb-oidc
  auth:
    username: rucio
    password: rucio
    database: rucio
  primary:
    persistence:
      enabled: true
      size: 2Gi

# ===========================================================================
# RUCIO SERVERS — local fork of upstream rucio/rucio-server chart
# (file://../rucio-server). The fork adds `items:` support to secretMounts.
# ===========================================================================
#
# Cert mount strategy:
#   - The X.509 client code in rucio refuses to use hostkey.pem if it is
#     world/group readable. Helm's `defaultMode` on a Secret volume applies
#     ONLY to directory mounts; subPath mounts always come out as 0644 and
#     k8s blocks chmod on subPath-mounted Secret files (read-only fs).
#   - Therefore the cert files are mounted as a single DIRECTORY at
#     /etc/grid-security with defaultMode 0400, using `items:` to map keys
#     to their canonical paths (rucio_ca.pem also lands under
#     certificates/ as both rucio_ca.pem and the hash-named alias).
#   - Config files stay on subPath because they don't need 0400 (and
#     stripping subPath would force a directory mount on a different path).

rucio:
  enabled: true
  fullnameOverride: rucio
  replicaCount: 1
  image:
    repository: rucio/rucio-server
    tag: release-40.0.0
    pullPolicy: IfNotPresent
  useSSL: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  useDeprecatedImplicitSecrets: false

  additionalEnvs:
    - name: REQUESTS_CA_BUNDLE
      value: /etc/grid-security/certificates/rucio_ca.pem
    - name: SSL_CERT_FILE
      value: /etc/pki/tls/certs/ca-bundle.crt

  secretMounts:
    # All grid certs in one Secret-backed directory mount.
    # defaultMode 0400 honored because there is NO subPath here.
    - secretFullName: testbed-certs
      volumeName: certs-grid
      mountPath: /etc/grid-security
      defaultMode: 0600
      items:
        - { key: hostcert.pem,          path: hostcert.pem }
        - { key: hostkey.pem,           path: hostkey.pem }
        - { key: hostcert_with_key.pem, path: hostcert_with_key.pem }
        - { key: rucio_ca.pem,          path: certificates/rucio_ca.pem }
        - { key: rucio_ca.pem,          path: certificates/5fca1cb1.0 }

    # Rucio config files — subPath fine, modes don't matter
    - secretFullName: rucio-server-cfg
      volumeName: rucio-cfg-server
      mountPath: /opt/rucio/etc/rucio.cfg
      subPath: server.cfg
    - secretFullName: rucio-server-cfg
      volumeName: rucio-cfg-alembic
      mountPath: /opt/rucio/etc/alembic.ini
      subPath: alembic.ini

"rucio-oidc":
  enabled: true
  fullnameOverride: rucio-oidc
  replicaCount: 1
  image:
    repository: rucio/rucio-server
    tag: release-40.0.0
    pullPolicy: IfNotPresent
  useSSL: false
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  useDeprecatedImplicitSecrets: false

  additionalEnvs:
    - name: REQUESTS_CA_BUNDLE
      value: /etc/grid-security/certificates/rucio_ca.pem
    - name: SSL_CERT_FILE
      value: /etc/pki/tls/certs/ca-bundle.crt

  secretMounts:
    # Same directory mount as the GSI server
    - secretFullName: testbed-certs
      volumeName: certs-grid
      mountPath: /etc/grid-security
      defaultMode: 0600
      items:
        - { key: hostcert.pem,          path: hostcert.pem }
        - { key: hostkey.pem,           path: hostkey.pem }
        - { key: hostcert_with_key.pem, path: hostcert_with_key.pem }
        - { key: rucio_ca.pem,          path: certificates/rucio_ca.pem }
        - { key: rucio_ca.pem,          path: certificates/5fca1cb1.0 }

    # Rucio OIDC config files
    - secretFullName: rucio-oidc-server-cfg
      volumeName: rucio-cfg-server
      mountPath: /opt/rucio/etc/rucio.cfg
      subPath: oidc-server.cfg
    - secretFullName: rucio-oidc-server-cfg
      volumeName: rucio-cfg-alembic
      mountPath: /opt/rucio/etc/alembic.ini
      subPath: alembic-oidc.ini
    - secretFullName: rucio-oidc-server-cfg
      volumeName: idpsecrets
      mountPath: /opt/rucio/etc/idpsecrets.json
      subPath: idpsecrets.json

    # Python patches
    - secretFullName: testbed-patches
      volumeName: fts3-patch
      mountPath: /usr/local/lib/python3.9/site-packages/rucio/transfertool/fts3.py
      subPath: rucio--fts3.py
    - secretFullName: testbed-patches
      volumeName: constants-patch
      mountPath: /usr/local/lib/python3.9/site-packages/rucio/common/constants.py
      subPath: rucio--constants.py

# ===========================================================================
# FTS — GSI and OIDC variants
# ===========================================================================

fts:
  enabled: true
  fullnameOverride: fts
  oidc:
    enabled: true
  ftsdb:
    enabled: true
    hostname: ftsdb
  ftsdbHost: ftsdb

ftsOidc:
  enabled: true
  fullnameOverride: fts-oidc
  oidc:
    enabled: true
  ftsdb:
    enabled: true
    hostname: ftsdb-oidc
  ftsdbHost: ftsdb-oidc

# ===========================================================================
# Keycloak
# ===========================================================================

keycloak:
  enabled: true   # only needed for OIDC flows
  fullnameOverride: keycloak

# ===========================================================================
# XRootD storage endpoints
# ===========================================================================

xrd1:
  enabled: true
  fullnameOverride: xrd1

xrd2:
  enabled: true
  fullnameOverride: xrd2

xrd3:
  enabled: true
  fullnameOverride: xrd3

xrd4:
  enabled: true
  fullnameOverride: xrd4

# ===========================================================================
# WebDAV endpoints
# ===========================================================================

webdav1:
  enabled: true
  fullnameOverride: webdav1
  certFiles:
    hostcert: webdav1cert.pem
    hostkey: webdav1key.pem
    ca: rucio_ca.pem

webdav2:
  enabled: true
  fullnameOverride: webdav2
  certFiles:
    hostcert: webdav2cert.pem
    hostkey: webdav2key.pem
    ca: rucio_ca.pem

# ===========================================================================
# StoRM-WebDAV endpoints
# ===========================================================================

storm1:
  enabled: true
  fullnameOverride: storm1
  certFiles:
    hostcert: storm1cert.pem
    hostkey: storm1key.pem
  authz:
    issuer: https://storm1:8443

storm2:
  enabled: true
  fullnameOverride: storm2
  certFiles:
    hostcert: storm2cert.pem
    hostkey: storm2key.pem
  authz:
    issuer: https://storm2:8443

# ===========================================================================
# MinIO endpoints
# ===========================================================================

minio1:
  enabled: true
  fullnameOverride: minio1

minio2:
  enabled: true
  fullnameOverride: minio2

# ===========================================================================
# Rucio client pod
# ===========================================================================

rucioClient:
  enabled: true
  fullnameOverride: rucio-client
