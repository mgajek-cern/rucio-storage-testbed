{{- if .Values.certs.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.certs.secretName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  {{- /*
    Two sources for cert material, in priority order:
    1. .Values.certs.files — populated by `--set-file` at install time. These
       arrive as base64-encoded strings when --set-file is used on a Secret's
       data field... actually, --set-file gives us the *raw* file content,
       so we must b64enc here.
    2. files/certs/*.pem under this chart — useful if the user checks in or
       symlinks the certs directory. Wins over empty values only.
  */}}
  {{- range $name, $content := .Values.certs.files }}
    {{- if $content }}
  {{ $name }}: {{ $content | b64enc }}
    {{- end }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "files/certs/*" }}
    {{- $name := base $path }}
    {{- if not (index $.Values.certs.files $name) }}
  {{ $name }}: {{ $.Files.Get $path | b64enc }}
    {{- end }}
  {{- end }}
{{- end }}
