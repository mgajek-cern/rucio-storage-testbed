{{- if .Values.certs.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.certs.secretName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  {{- /*
      Sourced from files/certs/
      Quotes around $name prevent hex/hash filenames from being parsed as numbers.
  */}}
  {{- range $name, $content := .Values.certs.files }}
    {{- if $content }}
  {{ $name | quote }}: {{ $content | b64enc }}
    {{- end }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "files/certs/**" }}
    {{- $name := base $path }}
    {{- /* We check if the content is non-empty to skip directory entries */}}
    {{- $content := $.Files.Get $path }}
    {{- if and $content (not (index $.Values.certs.files $name)) }}
  {{ $name | quote }}: {{ $content | b64enc }}
    {{- end }}
  {{- end }}
{{- end }}
