{{- if .Values.certs.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.certs.secretName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  {{- /*
      Sourced from files/certs/ — typically a symlink to the repo's ./certs/
      directory generated by scripts/generate-certs.sh. Every file in that
      directory becomes a key in this Secret, indexed by its basename.
  */}}
  {{- range $name, $content := .Values.certs.files }}
    {{- if $content }}
  {{ $name }}: {{ $content | b64enc }}
    {{- end }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "files/certs/*" }}
    {{- $name := base $path }}
    {{- if not (index $.Values.certs.files $name) }}
  {{ $name }}: {{ $.Files.Get $path | b64enc }}
    {{- end }}
  {{- end }}
{{- end }}
