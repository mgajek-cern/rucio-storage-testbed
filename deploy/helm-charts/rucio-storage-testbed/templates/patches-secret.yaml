{{- /*
  The upstream rucio-server chart only supports `secretMounts` (no ConfigMap
  mounts). These pass-through Secrets expose config and patch content so
  rucio-server can mount them the usual way.

  `testbed-patches` is also consumed by the fts-oidc deployment, so it is
  created whenever `patches.create` is true (regardless of rucio.enabled).

  Security note: the content is not sensitive (it's non-secret config + Python
  source), but storing it as a Secret costs nothing and avoids a chart fork.
*/}}
{{- if .Values.patches.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.patches.configMapName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- range $path, $_ := .Files.Glob "files/patches/**" }}
    {{- $rel := trimPrefix "files/patches/" $path }}
    {{- $key := replace "/" "--" $rel }}
  {{ $key }}: {{ $.Files.Get $path | b64enc }}
  {{- end }}
{{- end }}
