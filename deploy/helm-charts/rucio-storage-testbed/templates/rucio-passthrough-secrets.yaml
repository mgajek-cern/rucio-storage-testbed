{{- /*
  The upstream rucio-server chart only supports `secretMounts` (no ConfigMap
  mounts). These pass-through Secrets expose config and patch content so
  rucio-server can mount them the usual way.

  `testbed-patches` is also consumed by the fts-oidc deployment, so it is
  created whenever `patches.create` is true (regardless of rucio.enabled).

  Security note: the content is not sensitive (it's non-secret config + Python
  source), but storing it as a Secret costs nothing and avoids a chart fork.
*/}}
{{- if .Values.patches.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.patches.configMapName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- range $path, $_ := .Files.Glob "files/patches/**" }}
    {{- $rel := trimPrefix "files/patches/" $path }}
    {{- $key := replace "/" "--" $rel }}
  {{ $key }}: {{ $.Files.Get $path | b64enc }}
  {{- end }}
{{- end }}
{{- if .Values.rucio.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: rucio-server-cfg
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if .Files.Get "files/configs/server.cfg" }}
  server.cfg: {{ .Files.Get "files/configs/server.cfg" | b64enc }}
  {{- end }}
  {{- if .Files.Get "files/configs/alembic.ini" }}
  alembic.ini: {{ .Files.Get "files/configs/alembic.ini" | b64enc }}
  {{- end }}
{{- end }}
{{- if .Values.rucioOidc.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: rucio-oidc-cfg
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if .Files.Get "files/configs/oidc-server.cfg" }}
  oidc-server.cfg: {{ .Files.Get "files/configs/oidc-server.cfg" | b64enc }}
  {{- end }}
  {{- if .Files.Get "files/configs/alembic-oidc.ini" }}
  alembic-oidc.ini: {{ .Files.Get "files/configs/alembic-oidc.ini" | b64enc }}
  {{- end }}
  {{- if .Files.Get "files/configs/idpsecrets.json" }}
  idpsecrets.json: {{ .Files.Get "files/configs/idpsecrets.json" | b64enc }}
  {{- end }}
{{- end }}
