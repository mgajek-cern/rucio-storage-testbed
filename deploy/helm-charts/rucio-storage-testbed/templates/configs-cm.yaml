{{- if .Values.configs.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configs.configMapName }}
  labels:
    app.kubernetes.io/name: rucio-storage-testbed
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{- /*
    Slurp every file under files/configs/ — including nested directories —
    and expose them flat (last path component as key). This matches what the
    docker-compose bind mounts look like from inside each container:

        shared/config/fts/fts3config-oidc  →  /etc/fts3/fts3config
        shared/config/keycloak/realm.json  →  /opt/keycloak/data/import/realm.json

    Each subchart's volumeMount uses `subPath: <flat-name>` to pick the
    specific key it needs.
  */}}
  {{- range $path, $_ := .Files.Glob "files/configs/**" }}
    {{- $name := base $path }}
  {{ $name }}: |-
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
