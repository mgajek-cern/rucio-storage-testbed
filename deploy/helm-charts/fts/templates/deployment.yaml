apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fts.fullname" . }}
  labels:
    app: {{ include "fts.name" . }}
    instance: {{ include "fts.fullname" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "fts.name" . }}
      instance: {{ include "fts.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "fts.name" . }}
        instance: {{ include "fts.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      hostname: {{ include "fts.fullname" . }}
      serviceAccountName: {{ include "fts.fullname" . }}
      containers:
        - name: fts
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.oidc.enabled }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Install kubectl
              if ! command -v kubectl >/dev/null 2>&1; then
                ARCH=$$(uname -m)
                case $$ARCH in
                  x86_64)  K8S_ARCH=amd64 ;;
                  aarch64) K8S_ARCH=arm64 ;;
                  *) echo "Unsupported arch: $$ARCH"; exit 1 ;;
                esac

                KUBECTL_VERSION=$$(curl -L -s https://dl.k8s.io/release/stable.txt)

                curl -LO \
                  "https://dl.k8s.io/release/$${KUBECTL_VERSION}/bin/linux/$${K8S_ARCH}/kubectl"

                install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
                rm -f kubectl
              fi

              kubectl version --client || true

              pip install pytest --quiet

              # CA trust injection
              if ! grep -q "5fca1cb1" /etc/pki/tls/certs/ca-bundle.crt; then
                cat /etc/grid-security/certificates/5fca1cb1.0 >> /etc/pki/tls/certs/ca-bundle.crt
              fi

              /docker-entrypoint.sh
          {{- else }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              # Install mc
              if ! command -v mc >/dev/null 2>&1; then
                ARCH=$$(uname -m)
                case $$ARCH in
                  x86_64)  MC_ARCH=amd64 ;;
                  aarch64) MC_ARCH=arm64 ;;
                  *) echo "Unsupported arch: $$ARCH"; exit 1 ;;
                esac

                curl -sSL \
                  https://dl.min.io/client/mc/release/linux-$$MC_ARCH/mc \
                  -o /usr/local/bin/mc

                chmod +x /usr/local/bin/mc
              fi

              # Install kubectl
              if ! command -v kubectl >/dev/null 2>&1; then
                ARCH=$$(uname -m)
                case $$ARCH in
                  x86_64)  K8S_ARCH=amd64 ;;
                  aarch64) K8S_ARCH=arm64 ;;
                  *) echo "Unsupported arch: $$ARCH"; exit 1 ;;
                esac

                KUBECTL_VERSION=$$(curl -L -s https://dl.k8s.io/release/stable.txt)

                curl -LO \
                  "https://dl.k8s.io/release/$${KUBECTL_VERSION}/bin/linux/$${K8S_ARCH}/kubectl"

                install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
                rm -f kubectl
              fi

              kubectl version --client || true

              # Python test deps
              pip install --quiet pytest

              # Proxy init
              voms-proxy-init \
                --cert /etc/grid-security/hostcert.pem \
                --key  /etc/grid-security/hostkey.pem \
                --out  /tmp/x509up_u0 \
                --valid 12:00

              chmod 600 /tmp/x509up_u0

              # CA trust injection
              if ! grep -q "5fca1cb1" /etc/pki/tls/certs/ca-bundle.crt; then
                cat /etc/grid-security/certificates/5fca1cb1.0 >> /etc/pki/tls/certs/ca-bundle.crt
              fi

              exec /docker-entrypoint.sh
          {{- end }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: FTS_DB_HOST
              value: {{ .Values.ftsdbHost | quote }}
          ports:
            - name: rest
              containerPort: 8446
              protocol: TCP
            - name: monitoring
              containerPort: 8449
              protocol: TCP
          volumeMounts:
            # Certs
            - name: certs
              mountPath: /etc/grid-security/hostcert.pem
              subPath: hostcert.pem
            - name: certs
              mountPath: /etc/grid-security/hostkey.pem
              subPath: hostkey.pem
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.0
              subPath: 5fca1cb1.0
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.signing_policy
              subPath: 5fca1cb1.signing_policy
            - name: certs
              mountPath: /etc/grid-security/certificates/b96dc756.0
              subPath: b96dc756.0
            - name: certs
              mountPath: /etc/grid-security/certificates/b96dc756.signing_policy
              subPath: b96dc756.signing_policy
            - name: certs
              mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt
              subPath: rucio_ca.pem
              readOnly: false
            # Shared scripts directory (mirrors the compose bind of shared/scripts → /scripts)
            - name: scripts
              mountPath: /scripts
            {{- if .Values.oidc.enabled }}
            # OIDC-specific configs override the image defaults
            - name: configs
              mountPath: /etc/fts3/fts3config
              subPath: fts3config-oidc
            - name: configs
              mountPath: /etc/fts3/fts3restconfig
              subPath: fts3restconfig-oidc
            # Python patches for fts-rest-flask
            - name: patches
              mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/config/middleware.py
              subPath: fts--middleware.py
            - name: patches
              mountPath: /tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/openidconnect.py
              subPath: fts--openidconnect.py
            # Gfal2 HTTP plugin (always applied, present in both modes)
            - name: configs
              mountPath: /etc/gfal2.d/http_plugin.conf
              subPath: gfal2_http_plugin.conf
            - name: scripts-fts
              mountPath: /docker-entrypoint.sh
              subPath: docker-entrypoint-oidc.sh
            {{- else }}
            # Gfal2 XrootD plugin (always applied, present in both modes)
            - name: configs
              mountPath: /etc/gfal2.d/xrootd_plugin.conf
              subPath: gfal2_xrootd_plugin.conf
            - name: scripts-fts
              mountPath: /docker-entrypoint.sh
              subPath: docker-entrypoint-gsi.sh
            {{- end }}
          {{- if .Values.healthcheck.enabled }}
          readinessProbe:
            exec:
              command: ["curl", "-sk", "https://localhost:8446/whoami"]
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.certsSecret }}
            defaultMode: 0600
            items:
              - key: hostcert.pem
                path: hostcert.pem
                mode: 0600
              - key: hostkey.pem
                path: hostkey.pem
                mode: 0600
              - key: rucio_ca.pem
                path: rucio_ca.pem
                mode: 0644
              - key: 5fca1cb1.0
                path: 5fca1cb1.0
                mode: 0644
              - key: 5fca1cb1.signing_policy
                path: 5fca1cb1.signing_policy
                mode: 0644
              - key: b96dc756.0
                path: b96dc756.0
                mode: 0644
              - key: b96dc756.signing_policy
                path: b96dc756.signing_policy
                mode: 0644
        - name: scripts
          configMap:
            name: {{ .Values.scriptsConfigMap }}
            defaultMode: 0755
        - name: scripts-fts
          configMap:
            name: {{ .Values.scriptsConfigMap }}-fts
            defaultMode: 0755
        - name: configs
          configMap:
            name: {{ .Values.configsConfigMap }}
        {{- if .Values.oidc.enabled }}
        - name: patches
          secret:
            secretName: {{ .Values.patchesSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
