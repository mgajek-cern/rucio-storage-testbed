apiVersion: v1
kind: Service
metadata:
  name: {{ include "webdav.fullname" . }}
  labels:
    app: {{ include "webdav.name" . }}
    instance: {{ include "webdav.fullname" . }}
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    app: {{ include "webdav.name" . }}
    instance: {{ include "webdav.fullname" . }}
