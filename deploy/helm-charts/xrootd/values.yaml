# Default values for the xrootd chart.
# This chart deploys one XRootD instance. The umbrella chart installs it
# twice (xrd1, xrd2) with different `fullnameOverride`s.

image:
  repository: rucio/test-xrootd
  # Pinned digest from the compose file (rucio/test-xrootd plain GSI build)
  tag: ""
  digest: "sha256:27d212ec136d6d2ed7029fc445384053acb551805060cae554597a32e6361df4"
  pullPolicy: IfNotPresent

# Service hostname — must match what the Rucio RSE entries expect
fullnameOverride: ""

service:
  type: ClusterIP
  port: 1094

# XRDPORT env var
xrdPort: 1094

# Whether this instance should pre-create an fts-test file
# (matches the xrd1 entrypoint override in docker-compose)
seedTestFile: false

# Name of the Secret holding TLS certs (created by the umbrella chart).
# Keys used: xrdcert.pem, xrdkey.pem, rucio_ca.pem
certsSecret: testbed-certs

# ConfigMap holding the grid-mapfile
configsConfigMap: testbed-configs

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
