# Default values for the xrootd chart.
# This chart deploys one XRootD instance. The umbrella chart installs it
# twice (xrd1, xrd2) with different `fullnameOverride`s.

image:
  repository: mgajekcern/test-xrd
  tag: latest
  pullPolicy: IfNotPresent

# Service hostname — must match what the Rucio RSE entries expect
fullnameOverride: ""

service:
  type: ClusterIP
  port: 1094

# XRDPORT env var
xrdPort: 1094

certFile: xrd1cert.pem
keyFile: xrd1key.pem

# Name of the Secret holding TLS certs (created by the umbrella chart).
# Keys used: xrdcert.pem, xrdkey.pem, rucio_ca.pem
certsSecret: testbed-certs

# ConfigMap holding the grid-mapfile
configsConfigMap: testbed-configs

# Holds docker-entrypoint.sh
scriptsConfigMap: testbed-scripts

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
