apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xrootd.fullname" . }}
  labels:
    app: {{ include "xrootd.name" . }}
    instance: {{ include "xrootd.fullname" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "xrootd.name" . }}
      instance: {{ include "xrootd.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "xrootd.name" . }}
        instance: {{ include "xrootd.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      hostname: {{ include "xrootd.fullname" . }}
      containers:
        - name: xrootd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "/usr/local/bin/docker-entrypoint.sh"]
          env:
            - name: XRDPORT
              value: {{ .Values.xrdPort | quote }}
          ports:
            - name: xrootd
              containerPort: {{ .Values.xrdPort }}
              protocol: TCP
          volumeMounts:
            - name: certs
              mountPath: /tmp/xrdcert.pem
              subPath: {{ .Values.certFile }}
            - name: certs
              mountPath: /tmp/xrdkey.pem
              subPath: {{ .Values.keyFile }}
            - name: certs
              mountPath: /etc/pki/ca-trust/source/anchors/rucio-ca.crt
              subPath: rucio_ca.pem
            - name: scripts
              mountPath: /usr/local/bin/docker-entrypoint.sh
              subPath: docker-entrypoint.sh
              readOnly: true
            {{- if .Values.scitokens.enabled }}
            # SciTokens mode: single CA hash, no signing policy needed
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.0
              subPath: rucio_ca.pem
            - name: configs
              mountPath: /etc/xrootd/xrdrucio.cfg
              subPath: xrdrucio-scitokens.cfg
              readOnly: true
            - name: configs
              mountPath: /etc/xrootd/authdb
              subPath: authdb
              readOnly: true
            - name: configs
              mountPath: /etc/xrootd/scitokens.conf
              subPath: scitokens.conf
              readOnly: true
            {{- else }}
            # GSI mode: both CA hashes + signing policies required by libXrdSecgsi
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.0
              subPath: 5fca1cb1.0
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.signing_policy
              subPath: 5fca1cb1.signing_policy
            - name: certs
              mountPath: /etc/grid-security/certificates/b96dc756.0
              subPath: b96dc756.0
            - name: certs
              mountPath: /etc/grid-security/certificates/b96dc756.signing_policy
              subPath: b96dc756.signing_policy
            - name: configs
              mountPath: /etc/grid-security/grid-mapfile
              subPath: grid-mapfile
            - name: configs
              mountPath: /etc/xrootd/xrdrucio.cfg
              subPath: xrdrucio-gsi.cfg
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.certsSecret }}
            defaultMode: 0600
            items:
              - key: {{ .Values.certFile }}
                path: {{ .Values.certFile }}
                mode: 0600
              - key: {{ .Values.keyFile }}
                path: {{ .Values.keyFile }}
                mode: 0600
              - key: rucio_ca.pem
                path: rucio_ca.pem
                mode: 0644
              {{- if not .Values.scitokens.enabled }}
              - key: 5fca1cb1.0
                path: 5fca1cb1.0
                mode: 0644
              - key: 5fca1cb1.signing_policy
                path: 5fca1cb1.signing_policy
                mode: 0644
              - key: b96dc756.0
                path: b96dc756.0
                mode: 0644
              - key: b96dc756.signing_policy
                path: b96dc756.signing_policy
                mode: 0644
              {{- end }}
        - name: configs
          configMap:
            name: {{ .Values.configsConfigMap }}
        - name: scripts
          configMap:
            name: {{ .Values.scriptsConfigMap }}-xrootd
            defaultMode: 0755
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
