apiVersion: v1
kind: Service
metadata:
  name: {{ include "minio.fullname" . }}
  labels:
    app: {{ include "minio.name" . }}
    instance: {{ include "minio.fullname" . }}
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.ports.api }}
      targetPort: api
      name: api
    - port: {{ .Values.service.ports.console }}
      targetPort: console
      name: console
  selector:
    app: {{ include "minio.name" . }}
    instance: {{ include "minio.fullname" . }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "minio.fullname" . }}
  labels:
    app: {{ include "minio.name" . }}
    instance: {{ include "minio.fullname" . }}
    release: {{ .Release.Name }}
spec:
  serviceName: {{ include "minio.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "minio.name" . }}
      instance: {{ include "minio.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "minio.name" . }}
        instance: {{ include "minio.fullname" . }}
        release: {{ .Release.Name }}
    spec:
      hostname: {{ include "minio.fullname" . }}
      containers:
        - name: minio
          image: {{ include "minio.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server", "/data", "--console-address", ":{{ .Values.service.ports.console }}"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.credentials.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.credentials.rootPassword | quote }}
          ports:
            - name: api
              containerPort: {{ .Values.service.ports.api }}
            - name: console
              containerPort: {{ .Values.service.ports.console }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["mc", "ready", "local"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
