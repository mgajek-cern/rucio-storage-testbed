# Default values for the minio chart.
# The umbrella installs this twice (minio1, minio2). Each StatefulSet is
# followed by a short-lived init Job that pipes a test file into the bucket,
# mirroring the minio1-init / minio2-init containers in docker-compose.

image:
  repository: minio/minio
  tag: ""
  digest: "sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e"
  pullPolicy: IfNotPresent

mcImage:
  repository: minio/mc
  tag: ""
  digest: "sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727"
  pullPolicy: IfNotPresent

fullnameOverride: ""

service:
  type: ClusterIP
  ports:
    api: 9000
    console: 9001

credentials:
  rootUser: minioadmin
  rootPassword: minioadmin

persistence:
  enabled: true
  size: 2Gi
  storageClass: ""

# Bucket initialization — runs as a post-install Job
init:
  enabled: true
  bucket: fts-test
  testFile: fts-test-file
  testContent: fts-test

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
