# Default values for xrootd-scitokens.
# This image comes from the custom Dockerfile.xrd in the testbed repo.
# Deploys one SciTokens-enabled XRootD instance; umbrella installs xrd3 and xrd4.

image:
  repository: mgajekcern/test-xrd
  tag: latest
  pullPolicy: IfNotPresent

fullnameOverride: ""

service:
  type: ClusterIP
  port: 1094

xrdPort: 1094

certFile: xrd3cert.pem
keyFile: xrd3key.pem

# Secret and ConfigMap created by the umbrella chart
certsSecret: testbed-certs
# Holds xrdrucio.cfg, authdb, scitokens.conf
configsConfigMap: testbed-configs
# Holds docker-entrypoint.sh
scriptsConfigMap: testbed-scripts

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
