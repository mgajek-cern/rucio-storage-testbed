# Default values for xrootd-scitokens.
# This image comes from the custom Dockerfile.xrd-scitokens in the testbed repo.
# Deploys one SciTokens-enabled XRootD instance; umbrella installs xrd3 and xrd4.

image:
  # Build this from deploy/compose/Dockerfile.xrd-scitokens and push to your registry
  repository: mgajekcern/test-xrd-scitokens
  tag: latest
  pullPolicy: IfNotPresent

fullnameOverride: ""

service:
  type: ClusterIP
  port: 1094

xrdPort: 1094

# Secret and ConfigMap created by the umbrella chart
certsSecret: testbed-certs
# Holds xrdrucio.cfg, authdb, scitokens.conf
configsConfigMap: testbed-configs
# Holds docker-entrypoint-oidc.sh
scriptsConfigMap: testbed-scripts

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
