apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rucio-client.fullname" . }}
  labels:
    app: {{ include "rucio-client.name" . }}
    release: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "rucio-client.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "rucio-client.name" . }}
        release: {{ .Release.Name }}
    spec:
      hostname: {{ include "rucio-client.fullname" . }}
      containers:
        - name: client
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-c", "while true; do sleep 60; done"]
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: certs
              mountPath: /etc/grid-security/hostcert.pem
              subPath: hostcert.pem
              readOnly: true
            - name: certs
              mountPath: /etc/grid-security/hostkey.pem
              subPath: hostkey.pem
              readOnly: true
            - name: certs
              mountPath: /etc/grid-security/certificates/5fca1cb1.0
              subPath: rucio_ca.pem
              readOnly: true
            - name: certs
              mountPath: /etc/grid-security/certificates/rucio_ca.pem
              subPath: rucio_ca.pem
              readOnly: true
            - name: configs
              mountPath: /opt/rucio/etc/userpass-client.cfg
              subPath: userpass-client.cfg
              readOnly: true
            - name: configs
              mountPath: /opt/rucio/etc/userpass-client-for-rucio-oidc.cfg
              subPath: userpass-client-for-rucio-oidc.cfg
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            {{- if .Values.hostDockerSocket.enabled }}
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: certs
          secret:
            secretName: {{ .Values.certsSecret }}
        - name: configs
          configMap:
            name: {{ .Values.configsConfigMap }}
        - name: scripts
          configMap:
            name: {{ .Values.scriptsConfigMap }}
            defaultMode: 0755
        {{- if .Values.hostDockerSocket.enabled }}
        - name: docker-sock
          hostPath:
            path: {{ .Values.hostDockerSocket.path }}
            type: Socket
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
