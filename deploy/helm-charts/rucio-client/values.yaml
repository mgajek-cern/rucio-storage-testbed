# Rucio client pod — mirrors the rucio-client service in docker-compose.
# The compose version mounts /var/run/docker.sock for "docker-in-docker" tests; the Kubernetes version enables kubectl usage within the pod.

image:
  repository: mgajekcern/rucio-client-docker-kubectl
  tag: latest
  pullPolicy: IfNotPresent

fullnameOverride: rucio-client

env:
  - name: RUCIO_CFG_CLIENT_RUCIO_HOST
    value: http://rucio
  - name: RUCIO_CFG_CLIENT_AUTH_HOST
    value: http://rucio
  - name: RUCIO_CFG_CLIENT_AUTH_TYPE
    value: userpass
  - name: RUCIO_CFG_CLIENT_USERNAME
    value: ddmlab
  - name: RUCIO_CFG_CLIENT_PASSWORD
    value: secret
  - name: RUCIO_CFG_CLIENT_ACCOUNT
    value: root
  - name: REQUESTS_CA_BUNDLE
    value: /etc/grid-security/certificates/rucio_ca.pem

# Shared artifacts provided by the umbrella chart.
certsSecret: testbed-certs
# Contains userpass-client.cfg and userpass-client-for-rucio-oidc.cfg
configsConfigMap: testbed-configs
# Contains all test scripts
scriptsConfigMap: testbed-scripts

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
