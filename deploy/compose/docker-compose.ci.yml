services:
  fts:
    image: mgajekcern/test-fts:latest
    hostname: fts
    environment:
      - REQUESTS_CA_BUNDLE=/etc/pki/tls/certs/ca-bundle.crt
      - SSL_CERT_FILE=/etc/pki/tls/certs/ca-bundle.crt
    ports:
      - "8446:8446"
      - "8449:8449"
    depends_on:
      - ftsdb
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts:/scripts:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/fts/gfal2_http_plugin.conf:/etc/gfal2.d/http_plugin.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8446/whoami"]
      interval: 5s
      timeout: 5s
      retries: 20

  ftsdb:
    image: mysql:8
    hostname: ftsdb
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    ports:
      - "3306:3306"
    networks:
      - rucio-storage-testbed
    volumes:
      - ftsdb-data:/var/lib/mysql

  xrd1:
    image: rucio/test-xrootd@sha256:27d212ec136d6d2ed7029fc445384053acb551805060cae554597a32e6361df4
    hostname: xrd1
    environment:
      - XRDPORT=1094
    ports:
      - "1094:1094"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/grid-mapfile:/etc/grid-security/grid-mapfile:ro
    entrypoint: >
      bash -c "
        mkdir -p /rucio &&
        echo 'fts-test' > /rucio/fts-test-file &&
        chown xrootd:xrootd /rucio/fts-test-file &&
        /docker-entrypoint.sh
      "

  xrd2:
    image: rucio/test-xrootd@sha256:27d212ec136d6d2ed7029fc445384053acb551805060cae554597a32e6361df4
    hostname: xrd2
    environment:
      - XRDPORT=1094
    ports:
      - "1095:1094"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/grid-mapfile:/etc/grid-security/grid-mapfile:ro

  xrd3:
    image: mgajekcern/test-xrd-scitokens:latest
    hostname: xrd3
    environment:
      - XRDPORT=1094
    ports:
      - "1096:1094"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/xrdrucio.cfg:/etc/xrootd/xrdrucio.cfg.tmpl:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/authdb:/etc/xrootd/authdb:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/scitokens.conf:/etc/xrootd/scitokens.conf:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts/xrootd/docker-entrypoint-oidc.sh:/usr/local/bin/docker-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint.sh"]

  xrd4:
    image: mgajekcern/test-xrd-scitokens:latest
    hostname: xrd4
    environment:
      - XRDPORT=1094
    ports:
      - "1097:1094"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/xrdcert.pem:/tmp/xrdcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/xrdkey.pem:/tmp/xrdkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/xrdrucio.cfg:/etc/xrootd/xrdrucio.cfg.tmpl:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/authdb:/etc/xrootd/authdb:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/xrootd/scitokens.conf:/etc/xrootd/scitokens.conf:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts/xrootd/docker-entrypoint-oidc.sh:/usr/local/bin/docker-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/docker-entrypoint.sh"]

  # FTS OIDC instance — bearer token auth, no GSI proxy
  ftsdb-oidc:
    image: mysql:8
    hostname: ftsdb-oidc
    environment:
      - MYSQL_USER=fts
      - MYSQL_PASSWORD=fts
      - MYSQL_ROOT_PASSWORD=fts
      - MYSQL_DATABASE=fts
    networks:
      - rucio-storage-testbed
    volumes:
      - ftsdb-oidc-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufts", "-pfts"]
      interval: 5s
      timeout: 5s
      retries: 20

  fts-oidc:
    image: mgajekcern/test-fts:latest
    hostname: fts-oidc
    environment:
      - REQUESTS_CA_BUNDLE=/etc/pki/tls/certs/ca-bundle.crt
      - SSL_CERT_FILE=/etc/pki/tls/certs/ca-bundle.crt
    ports:
      - "8447:8446"
    depends_on:
      ftsdb-oidc:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts:/scripts:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/fts/fts3config-oidc:/etc/fts3/fts3config:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/fts/fts3restconfig-oidc:/etc/fts3/fts3restconfig:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/fts/gfal2_http_plugin.conf:/etc/gfal2.d/http_plugin.conf:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts/fts/docker-entrypoint-oidc.sh:/docker-entrypoint.sh:ro
      - ${TESTBED_HOST_SOURCE}/shared/patches/fts/middleware.py:/tmp/fts-rest-flask/src/fts3rest/fts3rest/config/middleware.py:ro
      - ${TESTBED_HOST_SOURCE}/shared/patches/fts/openidconnect.py:/tmp/fts-rest-flask/src/fts3rest/fts3rest/lib/openidconnect.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8446/whoami"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 20

  minio1:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    hostname: minio1
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - rucio-storage-testbed
    volumes:
      - minio1-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio2:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    hostname: minio2
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - rucio-storage-testbed
    volumes:
      - minio2-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio1-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio1:
        condition: service_healthy
    networks:
      - rucio-storage-testbed
    entrypoint: >
      sh -c "
        mc alias set local http://minio1:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO1 bucket ready'
      "
    restart: "no"

  minio2-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio2:
        condition: service_healthy
    networks:
      - rucio-storage-testbed
    entrypoint: >
      sh -c "
        mc alias set local http://minio2:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/fts-test &&
        echo 'fts-test' | mc pipe local/fts-test/fts-test-file &&
        echo 'MinIO2 bucket ready'
      "
    restart: "no"

  webdav1:
    image: rucio/test-webdav@sha256:e639fedfa65cbf7516bd52c0e0be1f028f6eb92552454e70ce39b67c10fe6a3a
    hostname: webdav1
    ports:
      - "443:443"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/webdav1cert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/webdav1key.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "

  webdav2:
    image: rucio/test-webdav@sha256:e639fedfa65cbf7516bd52c0e0be1f028f6eb92552454e70ce39b67c10fe6a3a
    hostname: webdav2
    ports:
      - "444:443"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/webdav2cert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/webdav2key.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
    entrypoint: >
      bash -c "
        . /etc/apache2/envvars &&
        a2dismod zgridsite || true &&
        a2enmod ssl dav dav_fs &&
        a2ensite default-ssl &&
        openssl rehash /etc/grid-security/certificates/ &&
        mkdir -p /var/www/webdav &&
        chown www-data:www-data /var/www/webdav &&
        exec apache2 -D FOREGROUND
      "

  storm1:
    image: ghcr.io/italiangrid/storm-webdav:v1.12.0
    platform: linux/amd64
    hostname: storm1
    ports:
      - "8440:8443"
      - "8085:8085"
    depends_on:
      - keycloak
    networks:
      - rucio-storage-testbed
    environment:
      - STORM_WEBDAV_HOSTNAME_0=storm1
      - STORM_WEBDAV_HTTPS_PORT=8443
      - STORM_WEBDAV_HTTP_PORT=8085
      - STORM_WEBDAV_SA_CONFIG_DIR=/etc/storm/webdav/sa.d
      - STORM_WEBDAV_CERTIFICATE_PATH=/etc/grid-security/hostcert.pem
      - STORM_WEBDAV_PRIVATE_KEY_PATH=/etc/grid-security/hostkey.pem
      - STORM_WEBDAV_TRUST_ANCHORS_DIR=/etc/grid-security/certificates
      - STORM_WEBDAV_TRUST_ANCHORS_REFRESH_INTERVAL=0
      - STORM_WEBDAV_REQUIRE_CLIENT_CERT=false
      - STORM_WEBDAV_AUTHZ_SERVER_ENABLE=true
      - STORM_WEBDAV_AUTHZ_SERVER_ISSUER=https://storm1:8443
      - STORM_WEBDAV_AUTHZ_SERVER_SECRET=supersupersupersecretlongerthan32chars!
      - STORM_WEBDAV_OAUTH_ISSUERS_REFRESH_PERIOD_MINUTES=1
      - STORM_WEBDAV_JVM_OPTS=-Xms256m -Xmx512m -Djava.security.egd=file:/dev/${TESTBED_HOST_SOURCE}/urandom -Dspring.config.location=optional:classpath:/application.yml,file:/app/application-issuers.yml,file:/app/application-policies.yml -Dlogging.level.org.italiangrid.storm.webdav.oauth=DEBUG -Dlogging.level.org.springframework.security=DEBUG
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/storm1cert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/storm1key.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/trustanchors:/etc/grid-security/certificates:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/storm-application-issuers.yml:/app/application-issuers.yml:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/storm-application-policies.yml:/app/application-policies.yml:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/data.properties:/etc/storm/webdav/sa.d/data.properties:ro
      - ${TESTBED_HOST_SOURCE}/certs/storm-cacerts:/opt/java/openjdk/lib/security/cacerts:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/logback-access.xml:/etc/storm/webdav/logback-access.xml:ro
      - storm1-data:/storage/data
      - vomsdir:/etc/grid-security/vomsdir
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8085/.storm-webdav/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 20

  storm2:
    image: ghcr.io/italiangrid/storm-webdav:v1.12.0
    platform: linux/amd64
    hostname: storm2
    ports:
      - "8441:8443"
      - "8086:8085"
    depends_on:
      - keycloak
    networks:
      - rucio-storage-testbed
    environment:
      - STORM_WEBDAV_HOSTNAME_0=storm2
      - STORM_WEBDAV_HTTPS_PORT=8443
      - STORM_WEBDAV_HTTP_PORT=8085
      - STORM_WEBDAV_SA_CONFIG_DIR=/etc/storm/webdav/sa.d
      - STORM_WEBDAV_CERTIFICATE_PATH=/etc/grid-security/hostcert.pem
      - STORM_WEBDAV_PRIVATE_KEY_PATH=/etc/grid-security/hostkey.pem
      - STORM_WEBDAV_TRUST_ANCHORS_DIR=/etc/grid-security/certificates
      - STORM_WEBDAV_TRUST_ANCHORS_REFRESH_INTERVAL=0
      - STORM_WEBDAV_REQUIRE_CLIENT_CERT=false
      - STORM_WEBDAV_AUTHZ_SERVER_ENABLE=true
      - STORM_WEBDAV_AUTHZ_SERVER_ISSUER=https://storm2:8443
      - STORM_WEBDAV_AUTHZ_SERVER_SECRET=supersupersupersecretlongerthan32chars!
      - STORM_WEBDAV_OAUTH_ISSUERS_REFRESH_PERIOD_MINUTES=1
      - STORM_WEBDAV_JVM_OPTS=-Xms256m -Xmx512m -Djava.security.egd=file:/dev/${TESTBED_HOST_SOURCE}/urandom -Dspring.config.location=optional:classpath:/application.yml,file:/app/application-issuers.yml,file:/app/application-policies.yml -Dlogging.level.org.italiangrid.storm.webdav.oauth=DEBUG -Dlogging.level.org.springframework.security=DEBUG
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/storm2cert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/storm2key.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/trustanchors:/etc/grid-security/certificates:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/storm-application-issuers.yml:/app/application-issuers.yml:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/storm-application-policies.yml:/app/application-policies.yml:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/data.properties:/etc/storm/webdav/sa.d/data.properties:ro
      - ${TESTBED_HOST_SOURCE}/certs/storm-cacerts:/opt/java/openjdk/lib/security/cacerts:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/storm-webdav/logback-access.xml:/etc/storm/webdav/logback-access.xml:ro
      - storm2-data:/storage/data
      - vomsdir:/etc/grid-security/vomsdir
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8085/.storm-webdav/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.1
    hostname: keycloak
    command:
      - start-dev
      - --features=token-exchange
      - --health-enabled=true
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # HTTPS configuration — the issuer claim in JWTs will use this.
      - KC_HTTPS_CERTIFICATE_FILE=/etc/x509/https/keycloakcert.pem
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/etc/x509/https/keycloakkey.pem
      - KC_HOSTNAME=keycloak
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      # Keep HTTP enabled too so old healthchecks / dev tools still work
      # during the migration. Remove this once everything is on HTTPS.
      - KC_HTTP_ENABLED=true
    ports:
      - "8080:8080"
      - "8448:8443"
    networks:
      - rucio-storage-testbed
    volumes:
      - ${TESTBED_HOST_SOURCE}/shared/config/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
      - ${TESTBED_HOST_SOURCE}/certs/keycloakcert.pem:/etc/x509/https/keycloakcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/keycloakkey.pem:/etc/x509/https/keycloakkey.pem:ro

  ruciodb:
    image: postgres:14
    hostname: ruciodb
    environment:
      - POSTGRES_USER=rucio
      - POSTGRES_PASSWORD=rucio
      - POSTGRES_DB=rucio
    networks:
      - rucio-storage-testbed
    volumes:
      - ruciodb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucio"]
      interval: 5s
      timeout: 5s
      retries: 10

  ruciodb-oidc:
    image: postgres:14
    hostname: ruciodb-oidc
    environment:
      - POSTGRES_USER=rucio
      - POSTGRES_PASSWORD=rucio
      - POSTGRES_DB=rucio
    networks:
      - rucio-storage-testbed
    volumes:
      - ruciodb-oidc-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucio"]
      interval: 5s
      timeout: 5s
      retries: 10


  rucio:
    image: rucio/rucio-server@sha256:0d81e6c85616106443814a9c3193e13452da6a36de3d4569a7c9ca2d94db62b1
    hostname: rucio
    environment:
      - REQUESTS_CA_BUNDLE=/etc/grid-security/certificates/rucio_ca.pem
    ports:
      - "8070:80"
    depends_on:
      ruciodb:
        condition: service_healthy
      fts:
        condition: service_healthy
    networks:
      - rucio-storage-testbed
    entrypoint:
      - bash
      - -c
      - |
        python3 /scripts/rucio/bootstrap-db.py &&
        exec /docker-entrypoint.sh httpd -DFOREGROUND
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/server.cfg:/opt/rucio/etc/rucio.cfg:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/alembic.ini:/opt/rucio/etc/alembic.ini:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts:/scripts:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostcert_with_key.pem:/etc/grid-security/hostcert_with_key.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  rucio-oidc:
    image: rucio/rucio-server@sha256:0d81e6c85616106443814a9c3193e13452da6a36de3d4569a7c9ca2d94db62b1
    hostname: rucio-oidc
    environment:
      - REQUESTS_CA_BUNDLE=/etc/grid-security/certificates/rucio_ca.pem
    ports:
      - "8090:80"
    depends_on:
      ruciodb-oidc:
        condition: service_healthy
      fts:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - rucio-storage-testbed
    entrypoint:
      - bash
      - -c
      - |
        python3 /scripts/rucio/bootstrap-db.py &&
        exec /docker-entrypoint.sh httpd -DFOREGROUND
    volumes:
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/oidc-server.cfg:/opt/rucio/etc/rucio.cfg:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/alembic-oidc.ini:/opt/rucio/etc/alembic.ini:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/idpsecrets.json:/opt/rucio/etc/idpsecrets.json:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostcert_with_key.pem:/etc/grid-security/hostcert_with_key.pem:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts:/scripts:ro
      - ${TESTBED_HOST_SOURCE}/shared/patches/rucio/fts3.py:/usr/local/lib/python3.9/site-packages/rucio/transfertool/fts3.py:ro
      - ${TESTBED_HOST_SOURCE}/shared/patches/rucio/constants.py:/usr/local/lib/python3.9/site-packages/rucio/common/constants.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ping"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  rucio-client:
    image: mgajekcern/rucio-client-dind:latest
    hostname: rucio-client
    depends_on:
      rucio:
        condition: service_healthy
    networks:
      - rucio-storage-testbed
    environment:
      - RUCIO_CFG_CLIENT_RUCIO_HOST=http://rucio
      - RUCIO_CFG_CLIENT_AUTH_HOST=http://rucio
      - RUCIO_CFG_CLIENT_AUTH_TYPE=userpass
      - RUCIO_CFG_CLIENT_USERNAME=ddmlab
      - RUCIO_CFG_CLIENT_PASSWORD=secret
      - RUCIO_CFG_CLIENT_ACCOUNT=root
      - REQUESTS_CA_BUNDLE=/etc/grid-security/certificates/rucio_ca.pem
    volumes:
      - ${TESTBED_HOST_SOURCE}/certs/hostcert.pem:/etc/grid-security/hostcert.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/hostkey.pem:/etc/grid-security/hostkey.pem:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/5fca1cb1.0:ro
      - ${TESTBED_HOST_SOURCE}/certs/rucio_ca.pem:/etc/grid-security/certificates/rucio_ca.pem:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/userpass-client.cfg:/opt/rucio/etc/userpass-client.cfg:ro
      - ${TESTBED_HOST_SOURCE}/shared/config/rucio/userpass-client-for-rucio-oidc.cfg:/opt/rucio/etc/userpass-client-for-rucio-oidc.cfg:ro
      - ${TESTBED_HOST_SOURCE}/shared/scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - /bin/bash
      - -c
      - |
        pip install --no-cache-dir \
          --trusted-host pypi.org \
          --trusted-host pypi.python.org \
          --trusted-host files.pythonhosted.org \
          pytest &&
        sleep infinity

