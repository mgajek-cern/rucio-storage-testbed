# Load required modules
<IfModule !wsgi_module>
  LoadModule wsgi_module modules/mod_wsgi.so
</IfModule>
<IfModule !ssl_module>
  LoadModule ssl_module modules/mod_ssl.so
</IfModule>
# mod_gridsite not available in source build. X.509 proxy auth disabled
# <IfModule !gridsite_module>
#   LoadModule gridsite_module modules/mod_gridsite.so
# </IfModule>
<IfModule !version_module>
    LoadModule version_module modules/mod_version.so
</IfModule>

WSGISocketPrefix run/wsgi
WSGIPythonPath /tmp/fts-rest-flask/src

Listen 8446
<VirtualHost *:8446>
  SSLProtocol all -SSLv2 -SSLv3
  SSLCipherSuite RC4-SHA:AES128-SHA:HIGH:!aNULL:!MD5:!RC4
  SSLHonorCipherOrder on

  SSLCertificateFile /etc/grid-security/hostcert.pem
  SSLCertificateKeyFile /etc/grid-security/hostkey.pem
  SSLCACertificatePath /etc/grid-security/certificates/

  SSLVerifyClient optional
  SSLVerifyDepth  10

  # GridSite directives disabled - mod_gridsite not available
  # GridSiteGridHTTP off
  # GridSiteAutoPasscode off

  <IfVersion >= 2.4>
    SSLOptions +StdEnvVars +ExportCertData +LegacyDNStringFormat
  </IfVersion>
  <IfVersion < 2.4>
    SSLOptions +StdEnvVars +ExportCertData
  </IfVersion>

  SSLEngine on

  ErrorLog logs/fts3rest_error_log
  LogFormat "%a %l %u %t \"%r\" %>s %b %D"
  TransferLog logs/fts3rest_access_log
  LogLevel debug

  WSGIScriptAlias / /usr/libexec/fts3rest/fts3rest.wsgi
  AllowEncodedSlashes NoDecode

  <Location />
    <IfVersion >= 2.4>
      Require all granted
    </IfVersion>
    <IfVersion < 2.4>
      Order allow,deny
      Allow from all
    </IfVersion>
  </Location>

  WSGIPassAuthorization On
  WSGIDaemonProcess fts3rest processes=2 threads=15 maximum-requests=3000 display-name=fts3rest user=fts3 group=fts3 python-path=/tmp/fts-rest-flask/src/fts3rest
  WSGIProcessGroup fts3rest
  WSGIApplicationGroup %{GLOBAL}

  Header Set "X-Frame-Options" "DENY"
</VirtualHost>
