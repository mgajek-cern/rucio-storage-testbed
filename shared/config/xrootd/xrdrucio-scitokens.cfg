# Ref: https://xrootd-howto.readthedocs.io/en/latest/tpc/, https://xrootd.web.cern.ch/doc/dev6/xrd_config.html
all.export /data
xrd.port 1094

# TLS (required for tokens)
xrd.tls /etc/grid-security/xrd/xrdcert.pem /etc/grid-security/xrd/xrdkey.pem
xrd.tlsca certdir /etc/grid-security/certificates
xrootd.tls capable all

# Sec lib (silences "strong authentication disabled" warning)
xrootd.seclib /usr/lib64/libXrdSec.so

# HTTP + TPC
xrd.protocol http:1094 libXrdHttp.so
http.exthandler xrdtpc libXrdHttpTPC.so
http.header2cgi Authorization authz

# Authorization (SciTokens)
ofs.authorize 1
ofs.authlib ++ libXrdAccSciTokens.so config=/etc/xrootd/scitokens.conf
acc.authdb /etc/xrootd/authdb

# Debugging — disable for production
scitokens.trace all
