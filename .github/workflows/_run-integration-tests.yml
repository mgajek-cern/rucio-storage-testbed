name: Run Integration Tests (reusable)

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      label:
        required: true
        type: string
      compose_file:
        required: false
        type: string
        default: deploy/compose/docker-compose.ci.yml

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    name: ${{ inputs.label }}
    timeout-minutes: 45
    env:
      TESTBED_HOST_SOURCE: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Generate certificates
        run: make certs

      - name: Start stack
        run: docker compose -f ${{ inputs.compose_file }} up -d

      - name: Wait for StoRM containers and import rucio CA into JVM truststore
        run: |
          # Wait for storm containers to be running (arm64 QEMU emulation is slow).
          # If still exited after timeout, dump logs to diagnose crash.
          for c in compose-storm1-1 compose-storm2-1; do
            echo "  Waiting for $c to be running..."
            for i in $(seq 1 36); do
              state=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null) || state="not_found"
              [[ "$state" == "running" ]] && { echo "  $c is running"; break; }
              if [[ "$i" == "36" ]]; then
                echo "  $c still $state after 3 minutes — dumping logs:"
                docker logs "$c" --tail 30 2>&1 || true
              fi
              echo "    [$i] $c state=$state — waiting..."; sleep 5
            done
            state=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null) || state="not_found"
            if [[ "$state" == "running" ]]; then
              docker exec --user root "$c" sh -c \
                "keytool -import -trustcacerts -noprompt \
                  -alias rucio-dev-ca \
                  -file /etc/grid-security/certificates/rucio_ca.pem \
                  -keystore /opt/java/openjdk/lib/security/cacerts \
                  -storepass changeit 2>/dev/null || true" \
                && echo "  $c: CA imported" || echo "  $c: keytool exec failed"
            else
              echo "  $c: skipping keytool (container not running)"
            fi
          done


      - name: Wait for FTS
        run: |
          for i in $(seq 1 40); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              --cert certs/hostcert.pem --key certs/hostkey.pem \
              --cacert certs/rucio_ca.pem https://localhost:8446/whoami) || true
            [[ "$code" == "200" ]] && { echo "FTS ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          docker compose -f ${{ inputs.compose_file }} logs fts; exit 1

      - name: Wait for Rucio
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://localhost:8070/ping) || true
            [[ "$code" == "200" ]] && { echo "Rucio ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          docker compose -f ${{ inputs.compose_file }} logs rucio; exit 1

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 40); do
            code=$(curl -skv -o /dev/null -w '%{http_code}' \
              https://localhost:8443/realms/rucio/.well-known/openid-configuration) || true
            [[ "$code" == "200" ]] && { echo "Keycloak ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          docker compose -f ${{ inputs.compose_file }} logs keycloak; exit 1

      - name: Bootstrap Rucio (seeds RSEs + token provider + restarts storm/fts-oidc)
        run: make bootstrap

      - name: Wait for fts-oidc
        run: |
          for i in $(seq 1 40); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              https://localhost:8447/whoami) || true
            [[ "$code" == "200" ]] && { echo "fts-oidc REST ready"; exit 0; }
            echo "  [$i] HTTP $code"; sleep 5
          done
          docker compose -f ${{ inputs.compose_file }} logs fts-oidc; exit 1

      - name: fts-oidc OIDC token auth check
        run: |
          # Fetch token from inside fts-oidc container (iss matches registered issuer)
          TOKEN=$(docker exec compose-fts-oidc-1 curl -sk \
            -u "rucio-oidc:rucio-oidc-secret" \
            -d "grant_type=password&username=randomaccount&password=secret" \
            https://keycloak:8443/realms/rucio/protocol/openid-connect/token \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          [ -z "$TOKEN" ] && { echo "Failed to obtain token"; exit 1; }

          RESP=$(curl -sk --cacert certs/rucio_ca.pem \
            -H "Authorization: Bearer $TOKEN" \
            https://localhost:8447/whoami)
          echo "whoami response: $RESP"

          METHOD=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('method',''))")
          [ "$METHOD" = "oauth2" ] || { echo "Expected method=oauth2, got: $METHOD"; exit 1; }
          echo "fts-oidc OIDC auth OK (method=$METHOD)"

      - name: XRootD TPC test
        run: make test-xrootd-gsi

      - name: S3 / MinIO test
        run: make test-s3

      - name: WebDAV test
        run: make test-webdav

      - name: StoRM WebDAV HTTP TPC test (OIDC token, no GSI)
        run: make test-storm

      - name: XRootD TPC test (OIDC token, no GSI)
        run: make test-xrootd-oidc

      - name: Rucio E2E transfer test
        run: make test-rucio

      - name: Rucio E2E transfer test (Python)
        run: make test-rucio-python

      - name: Dump logs on failure
        if: failure()
        run: |
          for svc in fts fts-oidc xrd1 xrd2 rucio rucio-oidc keycloak webdav1 storm1 storm2 minio1; do
            echo "=== $svc ===" && \
            docker compose -f ${{ inputs.compose_file }} logs $svc 2>/dev/null || true
          done

      - name: Tear down
        if: always()
        run: docker compose -f ${{ inputs.compose_file }} down -v
