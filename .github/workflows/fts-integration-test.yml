name: FTS Integration Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate certificates
        run: |
          mkdir -p certs
          cd certs

          cat > /tmp/fts-ext.cnf << 'EXTEOF'
          [ v3_req ]
          keyUsage = digitalSignature, keyEncipherment
          extendedKeyUsage = clientAuth
          EXTEOF

          openssl req -nodes -newkey rsa:2048 \
            -keyout hostkey.pem -out hostcert.csr -subj "/CN=fts"
          openssl x509 -req -days 365 \
            -in hostcert.csr \
            -CA rucio_ca.pem -CAkey rucio_ca.key.pem -CAcreateserial \
            -extfile /tmp/fts-ext.cnf -extensions v3_req \
            -out hostcert.pem
          chmod 600 hostkey.pem
          cat hostcert.pem hostkey.pem > hostcert_with_key.pem
          chmod 600 hostcert_with_key.pem

          openssl req -nodes -newkey rsa:2048 \
            -keyout xrdkey.pem -out xrdcert.csr -subj "/CN=xrd"
          openssl x509 -req -days 365 \
            -in xrdcert.csr \
            -CA rucio_ca.pem -CAkey rucio_ca.key.pem -CAcreateserial \
            -out xrdcert.pem
          chmod 600 xrdkey.pem

          for host in webdav1 webdav2; do
            openssl req -nodes -newkey rsa:2048 \
              -keyout ${host}key.pem -out ${host}cert.csr -subj "/CN=${host}"
            openssl x509 -req -days 365 \
              -in ${host}cert.csr \
              -CA rucio_ca.pem -CAkey rucio_ca.key.pem -CAcreateserial \
              -out ${host}cert.pem
            chmod 600 ${host}key.pem
          done

          rm -f *.csr *.srl /tmp/fts-ext.cnf

      - name: Set up QEMU (for x86_64 images on arm runners)
        uses: docker/setup-qemu-action@v3

      - name: Start stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for FTS to be healthy
        run: |
          for i in $(seq 1 40); do
            code=$(curl -sk -o /dev/null -w '%{http_code}' \
              --cert certs/hostcert.pem --key certs/hostkey.pem \
              --cacert certs/rucio_ca.pem \
              https://localhost:8446/whoami) || true
            [[ "$code" == "200" ]] && { echo "FTS ready after ${i}s"; exit 0; }
            echo "  [$i] HTTP $code — waiting..."
            sleep 3
          done
          echo "FTS did not become healthy in time"
          docker compose -f docker-compose.ci.yml logs fts
          exit 1

      - name: Wait for Rucio to be healthy
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://localhost:8445/ping) || true
            [[ "$code" == "200" ]] && { echo "Rucio ready after ${i}s"; exit 0; }
            echo "  [$i] HTTP $code — waiting..."
            sleep 3
          done
          echo "Rucio did not become healthy in time"
          docker compose -f docker-compose.ci.yml logs rucio
          exit 1

      # FTS smoke tests
      - name: Run XRootD TPC test
        run: |
          docker exec fts-multiarch-build-fts-1 bash -c \
            'FTS=https://fts:8446 python3 /scripts/test-fts-with-xrootd.py'

      - name: Run S3 / MinIO test
        run: ./scripts/test-fts-with-s3.sh

      - name: Run WebDAV test
        run: ./scripts/test-fts-with-webdav.sh

      # Rucio end-to-end test
      - name: Bootstrap Rucio (accounts, RSEs, protocols)
        run: ./scripts/rucio-init.sh

      - name: Run Rucio XRD1 → XRD2 transfer test
        run: ./scripts/test-rucio-transfers.sh

      # Diagnostics on failure
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== FTS logs ===" && docker compose -f docker-compose.ci.yml logs fts
          echo "=== XRD1 logs ===" && docker compose -f docker-compose.ci.yml logs xrd1
          echo "=== XRD2 logs ===" && docker compose -f docker-compose.ci.yml logs xrd2
          echo "=== Rucio logs ===" && docker compose -f docker-compose.ci.yml logs rucio
          echo "=== WebDAV1 logs ===" && docker compose -f docker-compose.ci.yml logs webdav1
          echo "=== MinIO1 logs ===" && docker compose -f docker-compose.ci.yml logs minio1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v