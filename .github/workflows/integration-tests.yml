name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-amd64:
    uses: ./.github/workflows/_run-integration-tests.yml
    with:
      runner: ubuntu-latest
      label: amd64
      compose_file: docker-compose.ci.yml

  test-arm64:
    uses: ./.github/workflows/_run-integration-tests.yml
    with:
      # ubuntu-24.04-arm: GitHub-hosted arm64 Linux runner, Docker + QEMU pre-installed
      runner: ubuntu-24.04-arm
      label: arm64
      compose_file: docker-compose.ci.yml